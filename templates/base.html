<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <!-- Charset & Viewport -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- IE Compatibility -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- Indexing -->
    <meta name="robots" content="index, follow">

    <!-- CSRF Token for Django -->
    <meta name="csrf-token" content="{{ csrf_token }}">

    <!-- Dynamic Title & Description -->
    <title>{% block title %}Water Supply Management System | Smart Water Supply Management System{% endblock %}</title>
    <meta name="description" content="{% block description %}Water Supply Management System - Intelligent water supply management with smart metering, automated billing, leak detection, and real-time monitoring.{% endblock %}">

    <!-- Canonical -->
    <link rel="canonical" href="https://Water Supply Management System.co.ke{% block canonical %}{% endblock %}">

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/static/img/favicon.webp">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon.webp">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon.webp">
    <link rel="manifest" href="/static/img/favicons/manifest.json">
    <meta name="msapplication-TileColor" content="#027333">
    <meta name="theme-color" content="#027333">

    <!-- Preconnects -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        /* Glassmorphism Core Styles */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 24px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.2);
        }

        .glass-nav {
            background: rgba(10, 25, 47, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-sidebar {
            background: rgba(10, 25, 47, 0.6);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Water Background Animation */
        .water-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            z-index: -2;
        }

        .water-wave {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 300px;
            background: linear-gradient(180deg, rgba(44, 83, 100, 0) 0%, rgba(44, 83, 100, 0.4) 100%);
            z-index: -1;
            animation: waveAnimation 8s ease-in-out infinite;
        }

        @keyframes waveAnimation {
            0%, 100% {
                transform: translateY(0px) scale(1);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-15px) scale(1.02);
                opacity: 0.5;
            }
        }

        /* Custom Input Styles */
        .glass-input {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 14px 18px;
            color: white;
            transition: all 0.3s ease;
            width: 100%;
        }

        .glass-input:focus {
            outline: none;
            border-color: rgba(0, 255, 200, 0.5);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(0, 255, 200, 0.1);
        }

        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Button Styles */
        .btn-primary {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            border: none;
            border-radius: 16px;
            padding: 14px 28px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -10px rgba(5, 150, 105, 0.4);
            background: linear-gradient(135deg, #047857 0%, #065f46 100%);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 12px 24px;
            color: white;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(5, 150, 105, 0.5);
            border-radius: 16px;
            padding: 12px 24px;
            color: #059669;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-outline:hover {
            background: rgba(5, 150, 105, 0.1);
            border-color: #059669;
        }

        /* Badge Styles */
        .badge-success {
            background: rgba(5, 150, 105, 0.2);
            border: 1px solid rgba(5, 150, 105, 0.4);
            color: #34d399;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid rgba(245, 158, 11, 0.4);
            color: #fbbf24;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-info {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.4);
            color: #60a5fa;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 500;
        }

        /* Table Styles */
        .glass-table {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            overflow: hidden;
            width: 100%;
        }

        .glass-table thead th {
            background: rgba(255, 255, 255, 0.05);
            padding: 16px;
            text-align: left;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .glass-table tbody td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: white;
        }

        .glass-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Navigation Links */
        .nav-link {
            transition: all 0.2s ease;
            color: rgba(255, 255, 255, 0.7);
        }

        .nav-link:hover {
            color: white;
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        .nav-link-active {
            background: rgba(5, 150, 105, 0.2);
            border-left: 3px solid #059669;
            color: white;
        }

        /* Custom Scroll Margin */
        :root {
            --phoenix-scroll-margin-top: 1.2rem;
        }
        
        [id] {
            scroll-margin-top: var(--phoenix-scroll-margin-top);
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body style="--phoenix-scroll-margin-top: 1.2rem;">
    <!-- Water Background (for glassmorphism effect) -->
    <div class="water-bg"></div>
    <div class="water-wave"></div>

    {% block content %}{% endblock %}

    <!-- Scripts -->
    <script>
        // Initialize AOS
        AOS.init({
            duration: 800,
            once: true,
            offset: 100
        });

        // CSRF Token setup for AJAX
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        const csrftoken = getCookie('csrftoken');
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
