{% extends 'base_dashboard.html' %}

{% block title %}Password Updated · AquaFlow{% endblock %}

{% block content %}
<div class="container-fluid px-0">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="github-card text-center">
                <div class="github-card-body p-5">
                    <!-- Success Icon -->
                    <div style="width: 70px; height: 70px; background: rgba(46, 204, 113, 0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                        <svg class="w-8 h-8" style="color: #2ecc71;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                    </div>
                    
                    <h4 class="fw-semibold mb-2" style="color: #7fcde8;">Password Updated!</h4>
                    <p style="color: #c0d6e8; margin-bottom: 24px;">Your password has been changed successfully.</p>
                    
                    <a href="{% url 'dashboard:home' %}" class="btn-primary-custom" style="padding: 10px 24px;">
                        Go to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
